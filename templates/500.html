{% extends "base.html" %}

{% block title %}Ошибка сервера{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 text-center">
        <div class="mt-5">
            <i class="fas fa-exclamation-circle fa-5x text-danger mb-4"></i>
            <h1 class="display-1">500</h1>
            <h2 class="mb-4">Внутренняя ошибка сервера</h2>
            <p class="lead mb-4">Произошла непредвиденная ошибка. Пожалуйста, попробуйте позже.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                <i class="fas fa-home"></i> Вернуться на главную
            </a>
        </div>
    </div>
</div>
{% endblock %}
